<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
}

.container { padding: 15px; }

header { text-align: center; color: white; }

#btnVoltar {
    display: none;
    margin: 10px 0;
    width: 100%;
    background: #1e3a8a;
    color: white;
}

button {
    padding: 15px;
    border: none;
    border-radius: 10px;
    background: #facc15;
    font-weight: bold;
}

/* MENU */
#menu {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 40px;
}

/* AGENDA */
#agenda { display: none; }

.linha {
    display: flex;
    background: rgba(255,249,196,0.9);
    border-bottom: 1px solid #ccc;
}

.hora {
    width: 70px;
    padding: 10px;
    border-right: 1px solid #ccc;
}

.texto {
    flex: 1;
    border: none;
    padding: 10px;
    background: transparent;
}

/* NOTAS */
#notas { display: none; }

#topoNotas {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

#listaNotas {
    max-height: 150px;
    overflow-y: auto;
}

.notaItem {
    background: rgba(224,242,254,0.9);
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 5px;
    display: flex;
    justify-content: space-between;
}

.notaItem span {
    flex: 1;
    cursor: pointer;
}

.excluir {
    background: red;
    color: white;
    border: none;
    border-radius: 5px;
    padding: 5px;
}

#editorNota {
    width: 100%;
    height: 250px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    padding: 10px;
    background: rgba(255,249,196,0.9);
}
</style>
</head>

<body>

<div class="container">

<header>
    <h2>📒 Minha Agenda</h2>
</header>

<button id="btnVoltar" onclick="voltarMenu()">⬅ Voltar</button>

<div id="menu">
    <button onclick="abrirAgenda()">📅 Horas Diárias</button>
    <button onclick="abrirNotas()">📝 Notas</button>
</div>

<div id="agenda"></div>

<div id="notas">

    <div id="topoNotas">
        <button onclick="criarNota()">➕ Nova Nota</button>
    </div>

    <div id="listaNotas"></div>

    <textarea id="editorNota" placeholder="Selecione ou crie uma nota..."></textarea>

</div>

</div>

<script>

// ===== FUNDO =====
function fundo(url) {
    document.body.style.backgroundImage = `url(${url})`;
}

function voltarMenu() {
    menu.style.display = "flex";
    agenda.style.display = "none";
    notas.style.display = "none";
    btnVoltar.style.display = "none";
    fundo("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f");
}

// ===== AGENDA =====
function abrirAgenda() {
    menu.style.display = "none";
    agenda.style.display = "block";
    btnVoltar.style.display = "block";
    fundo("https://images.unsplash.com/photo-1506784983877-45594efa4cbe");

    agenda.innerHTML = "";
    for (let i = 0; i < 24; i++) {
        let hora = String(i).padStart(2, '0') + ":00";

        let linha = document.createElement("div");
        linha.className = "linha";
        linha.innerHTML = `
            <div class="hora">${hora}</div>
            <input class="texto">
        `;
        agenda.appendChild(linha);
    }
}

// ===== NOTAS =====
let notaAtual = null;

function abrirNotas() {
    menu.style.display = "none";
    notas.style.display = "block";
    btnVoltar.style.display = "block";
    fundo("https://images.unsplash.com/photo-1517842645767-c639042777db");

    carregarNotas();
}

function getNotas() {
    return JSON.parse(localStorage.getItem("notas")) || {};
}

function salvarNotas(notas) {
    localStorage.setItem("notas", JSON.stringify(notas));
}

function criarNota() {
    let nome = prompt("Nome da nota:");
    if (!nome) return;

    let notas = getNotas();
    notas[nome] = "";
    salvarNotas(notas);

    notaAtual = nome;
    editorNota.value = "";

    carregarNotas();
}

function carregarNotas() {
    let lista = document.getElementById("listaNotas");
    lista.innerHTML = "";

    let notas = getNotas();

    for (let nome in notas) {
        let div = document.createElement("div");
        div.className = "notaItem";

        let span = document.createElement("span");
        span.innerText = nome;

        span.onclick = () => {
            notaAtual = nome;
            editorNota.value = notas[nome];
        };

        let btn = document.createElement("button");
        btn.innerText = "X";
        btn.className = "excluir";

        btn.onclick = () => {
            delete notas[nome];
            salvarNotas(notas);
            carregarNotas();
            editorNota.value = "";
            notaAtual = null;
        };

        div.appendChild(span);
        div.appendChild(btn);
        lista.appendChild(div);
    }
}

// AUTO SAVE
editorNota.addEventListener("input", () => {
    if (!notaAtual) return;

    let notas = getNotas();
    notas[notaAtual] = editorNota.value;
    salvarNotas(notas);
});

// iniciar fundo
fundo("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f");

</script>

</body>
</html>
